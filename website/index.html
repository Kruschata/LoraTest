<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRa Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>
    <main class="chat-shell">
        <section class="chat-panel">
            <header class="chat-header">
                <div>
                    <h1>LoRa Chat</h1>
                    <p>Peer-to-peer Textnachrichten ueber LilyGO T-Beam SX1276</p>
                </div>
                <span id="connectionStatus" class="status-badge status-warn">Verbinde...</span>
            </header>

            <div id="messageContainer" class="message-list" aria-live="polite">
                <div class="empty-state">Noch keine Nachrichten empfangen.</div>
            </div>

            <form id="chatForm" class="composer" autocomplete="off">
                <input
                    id="textInput"
                    class="form-control"
                    type="text"
                    maxlength="180"
                    placeholder="Nachricht eingeben..."
                    aria-label="Nachricht eingeben"
                >
                <button id="sendButton" class="btn btn-primary" type="submit">Senden</button>
            </form>
        </section>
    </main>
</body>
</html>
